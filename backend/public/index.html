<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Controle de Estoque</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark shadow">
<div class="container-fluid">

<span class="navbar-brand fw-bold">
Sistema de Controle de Fardamentos
</span>

<div>

<a href="index.html" class="btn btn-outline-light btn-sm">Estoque</a>
<a href="admin.html" class="btn btn-outline-light btn-sm">Cadastrar Produtos</a>
<a href="adminUsuarios.html" class="btn btn-outline-light btn-sm">Usuários</a>

</div>

</div>
</nav>

<div class="container mt-4">

<div class="row g-4">

<div class="col-md-4">

<div class="card shadow">

<div class="card-header bg-primary text-white">
Movimentação de Estoque
</div>

<div class="card-body">

<label class="form-label">Produto</label>
<select id="tipo" class="form-select mb-3"></select>

<label class="form-label">Tamanho</label>
<select id="tamanho" class="form-select mb-3"></select>

<label class="form-label">Quantidade</label>
<input id="qtd" type="number" class="form-control mb-3">

<label class="form-label">Tipo de movimentação</label>
<select id="acao" class="form-select mb-3">
<option value="add">Entrada</option>
<option value="rem">Saída</option>
</select>

<button onclick="movimentar()" class="btn btn-success w-100">
Registrar Movimentação
</button>

</div>

</div>

</div>

<div class="col-md-8">

<div class="card shadow">

<div class="card-header bg-dark text-white">
Resumo do Estoque
</div>

<div class="card-body">

<div id="resumo"></div>

</div>

</div>

</div>

</div>

<div class="card shadow mt-4">

<div class="card-header bg-secondary text-white">
Histórico de Movimentações
</div>

<div class="card-body">

<div id="historico"></div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
