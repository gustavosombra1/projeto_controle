<!DOCTYPE html>
<html>

<head>

<title>Usuários</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container-fluid">

<span class="navbar-brand">
Administração de Usuários
</span>

<a href="dashboard.html" class="btn btn-light">
Voltar
</a>

</div>
</nav>

<div class="container mt-4">

<h3>Cadastrar Usuário</h3>

<div class="row">

<div class="col-md-3">
<input id="nome" class="form-control" placeholder="Nome">
</div>

<div class="col-md-3">
<input id="email" class="form-control" placeholder="Email">
</div>

<div class="col-md-3">
<input id="senha" type="password" class="form-control" placeholder="Senha">
</div>

<div class="col-md-2">
<select id="cargo" class="form-control">

<option value="ti">TI</option>
<option value="rh">RH</option>
<option value="admin">Admin</option>

</select>
</div>

<div class="col-md-1">
<button onclick="salvar()" class="btn btn-success">
Salvar
</button>
</div>

</div>

<hr>

<h3>Usuários cadastrados</h3>

<table class="table table-striped">

<thead>
<tr>
<th>Nome</th>
<th>Email</th>
<th>Cargo</th>
</tr>
</thead>

<tbody id="listaUsuarios"></tbody>

</table>

</div>

<script src="adminUsuarios.js"></script>

</body>

</html>
